<!DOCTYPE html>
<html>
<head>
    <title>Virtual Medical Assistant</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
       

    body {
    
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    background: linear-gradient(rgba(0,0,50,0.7), rgba(0,0,50,0.7)),
                url('download.jpg');

    background-size: cover;
    background-position: center;
}


/* Background Animation */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* GLASS CARD */
.container {
    max-width: 400px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 20px;

    background: rgba(244, 241, 241, 0.879);
    backdrop-filter: blur(15px);

    box-shadow: 0px 10px 40px rgba(0,0,0,0.5);
    color: white;
}

/* TITLE */
h2 {
    text-align: center;
    color: #2f0353;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;

    background: rgba(255,255,255,0.2);
    color: rgb(48, 5, 67);
}

/* BUTTON BASE */
button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

/* CHECK BUTTON */
.check-btn {
    background: linear-gradient(135deg, #3604b5, #023f8a);
    color: white;
}

.check-btn:hover {
    transform: scale(1.05);
}

/* EMERGENCY BUTTON */
.emergency-btn {
    background: linear-gradient(135deg, #7e0622, #8a1c09);
    color: white;
}

.emergency-btn:hover {
    transform: scale(1.05);
}

/* HOSPITAL BUTTON */
.hospital-btn {
    background: linear-gradient(135deg, #4d0475, #015bb5);
    color: white;
}

.hospital-btn:hover {
    transform: scale(1.05);
}

/* CHAT BOX */
.chat-box {
    margin-top: 20px;
}

/* RESPONSE */
.response {
    background: rgba(255,255,255,0.15);
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}

/* VOICE BUTTON */
.voice-btn {
    background: linear-gradient(135deg, #430578, #350496);
    color: white;
}

.voice-btn:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h2> Virtual Medical Assistant & Emergency System</h2>
    

    <!-- FORM -->
    <form action="process.php" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="number" name="age" placeholder="Your Age" required>

        <textarea name="symptoms" placeholder="Describe your symptoms..." required></textarea>

        <button class="check-btn" type="submit">Check Health</button>
    </form>

    <!-- EMERGENCY -->
    <a href="emergency.php">
        <button class="emergency-btn" onclick="sendEmergency()">Emergency</button>
        </a>

<script>
function sendEmergency() {
    fetch("emergency.php")
    .then(() => {
        window.location.href = "tel:108";
    });
}
</script>

    

    <!-- HOSPITAL -->
    <button class="hospital-btn" onclick="findHospital()"> Find Nearby Hospitals</button>

    <!-- CHATBOT -->
    <div class="chat-box">
        <input type="text" id="chatInput" placeholder="Ask health question...">
        <button onclick="sendMessage()">Ask</button>
        <button class="voice-btn" onclick="startVoice()"> Speak</button>

        <div id="response" class="response"></div>
    </div>
</div>

<script>
function sendMessage() {
    let msg = document.getElementById("chatInput").value;

    fetch("chatbot.php", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "message=" + msg
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("response").innerHTML = data;
    });
}

function startVoice() {
    let recognition = new webkitSpeechRecognition();
    recognition.lang = "en-IN";

    recognition.onresult = function(event) {
        let speech = event.results[0][0].transcript;
        document.getElementById("chatInput").value = speech;
    };

    recognition.start();
}

function findHospital() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            window.open(`https://www.google.com/maps/search/hospitals/@${lat},${lon},15z`);
        });
    } else {
        alert("Location not supported");
    }
}
</script>

</body>
</html>
